// ---------- MARKET PRICE SIMULATION ----------
// Each product's "market price" drifts day to day instead of staying
// fixed — like a real commodity, it can go up OR down, including below
// what a buyer originally paid. This is what makes it an honest market
// model rather than a disguised guaranteed return: outcomes depend on
// which way the price actually moves, not a fixed schedule.
//
// The walk is deterministic (seeded from the product id + the date) so
// everyone sees the same price on the same day without needing a server
// — once there's a real backend, replace marketPriceFor() with a real
// price feed or admin-set daily price instead of this simulation.
function seededRandom(seedStr) {
  let h = 0;
  for (let i = 0; i < seedStr.length; i++) {
    h = (Math.imul(31, h) + seedStr.charCodeAt(i)) | 0;
  }
  // xorshift-ish scramble so nearby seeds don't produce nearly-identical output
  h ^= h << 13; h ^= h >>> 17; h ^= h << 5;
  return ((h >>> 0) % 100000) / 100000; // 0..1
}

function daysSinceEpoch(d = new Date()) {
  return Math.floor(d.getTime() / 86400000);
}

// Returns the day's cumulative drift multiplier (e.g. 1.04 = +4% from
// baseline) for a product, walking day by day from a fixed anchor so
// the result is stable and reproducible for any given date.
//
// IMPORTANT: compounding a symmetric +/-6% daily move does NOT average
// out to 1.0 over time (a -6% move followed by +6% is a net loss:
// 0.94 \u00d7 1.06 = 0.9964) \u2014 this is a real property of multiplicative
// random walks, not a bug in the percentage range itself. Left
// unbounded, the multiplier can wander arbitrarily far from 1 over
// enough days, which previously let Math.round() collapse every tier's
// price down to a flat \u20a61. MIN_MULT/MAX_MULT below bound how far the
// "market" can realistically drift from the price you set, so a real
// loss or gain stays meaningful instead of degenerating to noise.
const MIN_DRIFT_MULT = 0.4;  // floor: price can fall up to 60% from your set price
const MAX_DRIFT_MULT = 2.0;  // ceiling: price can rise up to 100% from your set price

function marketDriftMultiplier(product, atDate = new Date()) {
  const today = daysSinceEpoch(atDate);
  const startDay = daysSinceEpoch(new Date(2026, 0, 1)); // fixed anchor so history is stable
  let mult = 1;
  for (let day = startDay; day <= today; day++) {
    const r = seededRandom(`${product.id}:${day}`);
    const pctMove = (r - 0.5) * 0.12; // -6% .. +6% for that day
    mult = mult * (1 + pctMove);
    // Clamp every day, not just at the end \u2014 once a path nears the
    // floor/ceiling it should gently bounce rather than overshoot far
    // past it and need a long walk back.
    mult = Math.max(MIN_DRIFT_MULT, Math.min(MAX_DRIFT_MULT, mult));
  }
  return mult;
}

// Today's live price for one specific tier (plot/quarter/half/bag) of a
// product \u2014 the real price you supplied, drifted by the same daily
// market multiplier so all four sizes move together as one market.
function marketPriceForTier(product, tierKey, atDate = new Date()) {
  const base = (product.tierPrices && product.tierPrices[tierKey]) || 0;
  const mult = marketDriftMultiplier(product, atDate);
  return Math.max(1, Math.round(base * mult));
}

// Convenience: today's live Plot price, used wherever a single
// representative "unit price" for the product is needed (News, Hero, etc).
function marketPriceFor(product, atDate = new Date()) {
  return marketPriceForTier(product, "plot", atDate);
}

// 24h change, for showing an up/down indicator next to the price. Same
// for every tier of a product since they share one drift multiplier.
function marketChangePct(product, atDate = new Date()) {
  const todayMult = marketDriftMultiplier(product, atDate);
  const yesterday = new Date(atDate.getTime() - 86400000);
  const yesterdayMult = marketDriftMultiplier(product, yesterday);
  if (yesterdayMult === 0) return 0;
  return ((todayMult - yesterdayMult) / yesterdayMult) * 100;
}

// What a holding is worth right now at today's market price, vs what
// the buyer actually paid (their cost basis). gainLoss can be negative
// — a real loss is possible, same as it would be holding any real
// commodity.
function holdingCurrentValue(holding, catalog) {
  const product = catalog.find(p => p.id === holding.productId);
  if (!product) return { currentValue: holding.price, gainLoss: 0, gainLossPct: 0 };
  const currentValue = marketPriceForTier(product, holding.tierKey);
  const gainLoss = currentValue - holding.price;
  const gainLossPct = holding.price > 0 ? (gainLoss / holding.price) * 100 : 0;
  return { currentValue, gainLoss, gainLossPct };
}

// Every holding has a 30-day window: sell anytime within it, or it
// auto-sells at whatever the market price is on day 30. This is a real
// settlement deadline, not a payout promise — the price it sells at
// (current or auto) depends on the actual market walk and can be a loss.
const HOLDING_WINDOW_DAYS = 30;

function holdingDaysLeft(holding, atDate = new Date()) {
  const boughtMs = new Date(holding.boughtAt).getTime();
  const elapsedDays = (atDate.getTime() - boughtMs) / 86400000;
  return Math.max(0, Math.ceil(HOLDING_WINDOW_DAYS - elapsedDays));
}

function holdingIsExpired(holding, atDate = new Date()) {
  const boughtMs = new Date(holding.boughtAt).getTime();
  const elapsedDays = (atDate.getTime() - boughtMs) / 86400000;
  return elapsedDays >= HOLDING_WINDOW_DAYS;
}

// The four real sizes every product is sold in. Quarter and Half Bag
// were calculated as 25%/50% of each product's real Bag price; Plot and
// Bag are the exact prices supplied directly \u2014 see DEFAULT_PRODUCTS.
const TIER_DEFS = [

// Today's live tier prices for a product, reflecting the daily market
// drift applied to each tier's own real price.
function tiersFor(product) {
  return TIER_DEFS.map(t => ({ ...t, price: marketPriceForTier(product, t.key) }));
}

// Paystack requires a real email for receipts and payment recovery.
// Registration now captures this directly, so this should always have
// a real address \u2014 the placeholder fallback only protects against an
// account created before email capture existed.
function userEmailForPaystack(store) {
  if (store.profile?.email) return store.profile.email;
  const digits = (store.profile?.phone || "0000000000").replace(/\D/g, "");
  return `user${digits.slice(-10)}@reaplyst.placeholder`;
}

// ---------- local persistence (prototype-grade) ----------
// Everything below reads/writes a single localStorage key. There is no
// server, so this only persists on this device/browser. When a real
// backend exists, swap these functions for API calls and keep the same
// call sites (loadState/saveState/addRecord) so nothing else has to change.
const STORE_KEY = "reaplyst_state_v1";

function loadState() {
  try {
    const raw = window.localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function saveState(state) {
  try {
    window.localStorage.setItem(STORE_KEY, JSON.stringify(state));
  } catch (e) {
    // storage unavailable (private mode, quota, etc) — fail silently,
    // the app still works for the current session
  }
}

function defaultState() {
  return {
    authed: false,
    isAdmin: false,
    balance: 0,
    profile: { name: "", email: "", phone: "" }, // editable from the Personal screen
    notifications: [], // auto-generated app events, shown on the Messages screen
    catalog: DEFAULT_PRODUCTS.map(p => ({ ...p })), // admin-editable copy of the seed catalog
    holdings: [],      // { id, productId, productName, tierKey, tierLabel, price, boughtAt }
    purchases: [],      // purchase history rows
    recharges: [],       // recharge record rows
    withdrawals: [],      // withdrawal record rows
    balanceLog: [],      // combined balance-record rows (recharge/purchase/withdrawal)
    referralCode: null,         // this user's own code, generated at registration
    referredBy: null,           // the code typed in at registration, if any
    referrals: [],              // { id, codeUsed, joinedAt, convertedAt|null } — see note above REFERRAL_BONUS
    firstPurchaseBonusGiven: false, // one-time flag so the first-purchase bonus only fires once
  };
}

// Ensures state loaded from an older localStorage save (before catalog
// existed) still has every field the current app expects. isAdmin is
// kept in the shared shape for compatibility with Admin.html, which
// reads/writes this same storage key, even though this user app no
// longer has any admin UI of its own.
// A saved catalog from before tierPrices existed (it used a single
// basePrice + shared multiplier instead) is structurally incompatible
// with the current pricing system \u2014 every tier would read undefined
// and collapse to \u20a61. Detect that old shape and fall back to fresh
// seed data instead of keeping data that can't price anything correctly.
function catalogIsCurrentShape(catalog) {
  return Array.isArray(catalog) && catalog.length > 0 &&
    catalog.every(p => p && p.tierPrices && typeof p.tierPrices.bag === "number");
}

function hydrate(saved) {
  const base = defaultState();
  if (!saved) return base;
  return {
    ...base,
    ...saved,
    catalog: catalogIsCurrentShape(saved.catalog) ? saved.catalog : base.catalog,
  };
}

// HONEST LIMITATION: this whole app runs on localStorage, which is
// private to one browser on one device. Referrer and referred friend are
// two different real people on two different real phones, so neither
// device can see or credit the other's account from here \u2014 there's no
// shared server yet. The UI below is fully built and the reward logic is
// correct, but actually paying a real referrer when a real friend
// recharges on their own phone requires the backend described in
// PAYSTACK_SERVER_NOTES.md (referrals need their own server table,
// keyed by referralCode, checked when ANY user's recharge gets verified).

function nowISO() {
  return new Date().toISOString();
}

// ---------- WITHDRAWAL WINDOW ----------
// Business policy: withdrawals only open once a month, on the 30th
// (using the last day of the month for months with fewer than 30 days,
// e.g. February, so the rule still makes sense every month).
// This checks the real device clock, not anything stored in state, so
// the restriction can't be bypassed by editing localStorage values.
function lastDayOfMonth(year, monthIndex) {
  return new Date(year, monthIndex + 1, 0).getDate();
}

function isWithdrawalDay(d = new Date()) {
  const target = Math.min(30, lastDayOfMonth(d.getFullYear(), d.getMonth()));
  return d.getDate() === target;
}

// Returns a Date for the next upcoming withdrawal day, used to tell the
// user when the window opens if today isn't the day.
function nextWithdrawalDate(d = new Date()) {
  const thisMonthTarget = Math.min(30, lastDayOfMonth(d.getFullYear(), d.getMonth()));
  if (d.getDate() <= thisMonthTarget) {
    return new Date(d.getFullYear(), d.getMonth(), thisMonthTarget);
  }
  const nextMonth = d.getMonth() + 1;
  const nextYear = d.getFullYear() + (nextMonth > 11 ? 1 : 0);
  const normalizedMonth = nextMonth % 12;
  const nextTarget = Math.min(30, lastDayOfMonth(nextYear, normalizedMonth));
  return new Date(nextYear, normalizedMonth, nextTarget);
}

function fmtDateLong(d) {
  return d.toLocaleDateString("en-NG", { day: "numeric", month: "long", year: "numeric" });
}

// Renders the real product photo. Falls back to a soft tinted placeholder
// with the crop name if the image file isn't there yet, so the prototype
// still looks reasonable before real photos are dropped into /images/.
function CropPhoto({ product, height, width, fontSize = 13 }) {
  const [failed, setFailed] = useState(false);
  if (failed) {
    return (
      <div style={{
        width, height, minWidth: width, background: C.line, display: "flex",
        alignItems: "center", justifyContent: "center", fontSize, color: C.inkSoft,
        textAlign: "center", padding: 6,
      }}>{product.name}</div>
    );
  }
  return (
    <img
      src={product.photo}
      alt={product.name}
      onError={() => setFailed(true)}
      style={{ width, height, minWidth: width, objectFit: "cover", display: "block" }}
    />
  );
}

          }}>Quota {ownedCount} / {product.quota}</span>
        </div>
        <div style={{ marginBottom: 10 }}>
          <MarketChangeTag product={product} />

        {hasDiscount && (
          <div style={{
            display: "inline-flex", alignItems: "center", gap: 6, background: "#FBEAE7", color: "#B8392A",

          }}>Special offer: {product.discountPct}% off all sizes</div>
        )}
        <div style={{ fontSize: 13, color: C.inkSoft, marginBottom: 18 }}>
          {quotaReached
            ? "You\u2019ve reached the purchase limit for this product."
            : "Choose a share size below."}
        </div>
        {tiers.map(t => {
          const discounted = hasDiscount ? Math.round(t.price * (1 - product.discountPct / 100)) : t.price;
          return (
            <button key={t.key} onClick={() => !quotaReached && onSelectTier({ ...t, price: discounted })} disabled={quotaReached} style={{
              width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
              background: quotaReached ? C.cream : C.paper, border: `1px solid ${C.line}`, borderRadius: 12,
              padding: "14px 16px", marginBottom: 10, cursor: quotaReached ? "not-allowed" : "pointer",

                  {fmt(discounted)}

              </span>

// SECURITY NOTE — read this before going live:
// This only opens Paystack's real checkout popup with your PUBLIC key,
// which is safe to ship in frontend code. It does NOT credit the wallet.
// Crediting must happen on a server that verifies the payment with your
// SECRET key (which must never appear in this file). See the Node.js
// webhook handler in PAYSTACK_SERVER_NOTES.md, provided alongside this
// file, for the piece your developer deploys separately.
//
// Replace this with your real Paystack public key before testing live
// payments. Test keys start with pk_test_, live keys with pk_live_.
const PAYSTACK_PUBLIC_KEY = "pk_live_3919642124f9288ad1035a0043e24d8efab7ed19";

function openPaystackCheckout({ email, amountKobo, onSuccess, onClose }) {
  if (typeof window.PaystackPop === "undefined") {
    onClose && onClose("Paystack script hasn't loaded yet \u2014 check your internet connection and try again.");
    return;
  }
  const handler = window.PaystackPop.setup({
    key: PAYSTACK_PUBLIC_KEY,

// ---------- BRAND LOGO SLIDESHOW ----------
// Cycles through /images/logo1.jpg, logo2.jpg, logo3.jpg wherever the brand
// mark appears (currently just the Auth header). Drop this component into
// any other spot that's standing in on a plain icon as a brand placeholder.
// Falls back to the leaf icon if none of the logo files are present yet.
const LOGO_SLIDES = ["logo1.jpg", "logo2.jpg", "logo3.jpg"];

function LogoSlide({ size = 64, intervalMs = 5000, cover = false }) {
  const [index, setIndex] = useState(0);
  const [failedAll, setFailedAll] = useState(false);
  const [fullscreen, setFullscreen] = useState(false);
  const failedSet = React.useRef(new Set());

  React.useEffect(() => {
    if (failedAll) return;
    const t = setInterval(() => {
      setIndex(i => {
        let next = (i + 1) % LOGO_SLIDES.length;
        // skip over any slide already known to be missing
        let tries = 0;
        while (failedSet.current.has(next) && tries < LOGO_SLIDES.length) {
          next = (next + 1) % LOGO_SLIDES.length;
          tries++;
        }
        return next;
      });
    }, intervalMs);
    return () => clearInterval(t);
  }, [failedAll, intervalMs]);

  // Auto-return to the slideshow 10 seconds after opening fullscreen.
  React.useEffect(() => {
    if (!fullscreen) return;
    const t = setTimeout(() => setFullscreen(false), 10000);
    return () => clearTimeout(t);
  }, [fullscreen]);

  function handleError() {
    failedSet.current.add(index);
    if (failedSet.current.size >= LOGO_SLIDES.length) {
      setFailedAll(true);
      return;
    }
    setIndex(i => (i + 1) % LOGO_SLIDES.length);
  }

  if (failedAll) {
    return <Icon name="leaf" size={size * 0.75} color={C.cream} strokeWidth={1.3} />;
  }

  const imgEl = (
    <img
      key={LOGO_SLIDES[index]}
      src={LOGO_SLIDES[index]}
      alt="Reaplyst"
      onError={handleError}
      onClick={cover ? () => setFullscreen(true) : undefined}
      style={cover
        ? { width: "100%", height: "100%", objectFit: "cover", cursor: "pointer" }
        : { width: size, height: size, objectFit: "contain", borderRadius: size * 0.18 }}
    />
  );

  if (!fullscreen) return imgEl;

  return (
    <div onClick={() => setFullscreen(false)} style={{
      position: "fixed", inset: 0, background: "rgba(0,0,0,0.92)", zIndex: 999,
      display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
    }}>
      <img src={LOGO_SLIDES[index]} alt="Reaplyst" style={{ maxWidth: "92%", maxHeight: "80%", objectFit: "contain" }} />
    </div>
  );
}

// ---------- CAPTCHA ----------
// A drawn, scrambled-character challenge \u2014 the person must type what
// they see before registering. This is a basic bot deterrent, not real
// security (anyone reading the page source can see the answer in
// React state) \u2014 it stops simple automated signup spam, not a
// determined attacker. Canvas-drawn so the code can't be selected/
// copy-pasted as plain text the way a plain <div> of characters could be.
const CAPTCHA_CHARS = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // no 0/O/1/I to avoid confusion

function generateCaptchaCode(length = 5) {
  let code = "";
  for (let i = 0; i < length; i++) {
    code += CAPTCHA_CHARS[Math.floor(Math.random() * CAPTCHA_CHARS.length)];
  }
  return code;
}

function Captcha({ code, onRefresh }) {
  const canvasRef = React.useRef(null);

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "#F6F2EA";
    ctx.fillRect(0, 0, w, h);

    // noise lines
    for (let i = 0; i < 5; i++) {
      ctx.strokeStyle = `rgba(27, 58, 43, ${0.12 + Math.random() * 0.15})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(Math.random() * w, Math.random() * h);
      ctx.lineTo(Math.random() * w, Math.random() * h);
      ctx.stroke();
    }

    // scattered dots
    for (let i = 0; i < 40; i++) {
      ctx.fillStyle = `rgba(107, 107, 99, ${0.15 + Math.random() * 0.2})`;
      ctx.beginPath();
      ctx.arc(Math.random() * w, Math.random() * h, 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // each character, rotated and offset a bit
    const charWidth = w / code.length;
    for (let i = 0; i < code.length; i++) {
      ctx.save();
      const cx = charWidth * i + charWidth / 2;
      const cy = h / 2 + (Math.random() * 10 - 5);
      ctx.translate(cx, cy);
      ctx.rotate((Math.random() * 0.5 - 0.25));
      ctx.font = "bold 26px Georgia, serif";
      ctx.fillStyle = ["#1B3A2B", "#11271C", "#C9703D"][i % 3];
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(code[i], 0, 0);
      ctx.restore();
    }
  }, [code]);

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
      <canvas ref={canvasRef} width={160} height={50} style={{
        borderRadius: 8, border: `1px solid ${C.line}`, display: "block",
      }} />
      <button type="button" onClick={onRefresh} style={{
        border: `1px solid ${C.line}`, background: C.paper, borderRadius: 8,
        width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer", flexShrink: 0,
      }} aria-label="Refresh captcha">
        <Icon name="refresh" size={16} color={C.inkSoft} />
      </button>
    </div>
  );
}

function normalizePhone(phone) {
  return phone.replace(/\D/g, "");
}

// Supabase phone auth expects E.164 format (e.g. +2348012345678).
// Adjust the country code below if Reaplyst's users aren't Nigerian-only.
function toE164(rawPhone) {
  const digits = normalizePhone(rawPhone);
  if (digits.startsWith("234")) return `+${digits}`;
  if (digits.startsWith("0")) return `+234${digits.slice(1)}`;
  return `+234${digits}`;
}

async function registerAccount(phone, password, email) {
  const { data, error } = await supabase.auth.signUp({
    phone: toE164(phone),
    password,

  if (error) return { ok: false, error: error.message };
  return { ok: true, account: data.user };
}

async function checkLogin(phone, password) {
  const { data, error } = await supabase.auth.signInWithPassword({
    phone: toE164(phone),

  });
  if (error) return { ok: false, error: error.message };
  return { ok: true, account: data.user };
}

        </div>
      )}

}

function recordRowStyle() {
  return {

function fmtWhen(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("en-NG", { day: "2-digit", month: "short", year: "numeric" }) +
    " \u00b7 " + d.toLocaleTimeString("en-NG", { hour: "2-digit", minute: "2-digit" });
}

// ---------- APP ROOT ----------
function Reaplyst() {
  // Hydrate from localStorage once on first render; falls back to a
  // logged-out, zero-balance state if nothing was saved yet.
  const [store, setStore] = useState(() => hydrate(loadState()));
  const [authMode, setAuthMode] = useState("login");
  const [tab, setTab] = useState("home");
  const [screen, setScreen] = useState(null);
  const [activeProduct, setActiveProduct] = useState(null);
  const [activeTier, setActiveTier] = useState(null);
  const [toast, setToast] = useState(null);
  const [confirmingLogout, setConfirmingLogout] = useState(false);

  // Persist on every state change so a refresh/close doesn't lose data.
  React.useEffect(() => { saveState(store); }, [store]);

  function showToast(msg) {
    setToast(msg);
    setTimeout(() => setToast(null), 2200);
  }

  // Records a real notification tied to an actual app event, shown on
  // the Messages screen. Kept separate from showToast: toasts disappear
  // in 2 seconds, these persist until the user reads/clears them.
  function pushNotification(text) {
    setStore(s => ({
      ...s,
      notifications: [...s.notifications, { id: newId(), text, at: nowISO(), read: false }],
    }));
  }

  function ownedCountFor(productId) {
    return store.holdings.filter(h => h.productId === productId).length;
  }

  function openProduct(p) { setActiveProduct(p); setScreen("product"); }
  function selectTier(t) { setActiveTier(t); setScreen("tier"); }

  function confirmPurchase(action) {
    if (action === "recharge") { setScreen("recharge"); return; }
    const ownedNow = ownedCountFor(activeProduct.id);
    if (ownedNow >= activeProduct.quota) {
      showToast(`Quota reached for ${activeProduct.name}`);
      setScreen("product");
      return;
    }
    if (store.balance < activeTier.price) {
      showToast("Insufficient balance");
      return;
    }
    const record = {
      id: newId(), productId: activeProduct.id, productName: activeProduct.name,
      tierKey: activeTier.key, tierLabel: activeTier.label,
      price: activeTier.price, boughtAt: nowISO(),
    };
    const isFirstPurchase = !store.firstPurchaseBonusGiven;
    setStore(s => {
      const next = {
        ...s,
        balance: s.balance - activeTier.price,
        holdings: [...s.holdings, record],
        purchases: [...s.purchases, record],
        balanceLog: [...s.balanceLog, { id: newId(), type: "purchase", amount: -activeTier.price, label: `${activeProduct.name} \u00b7 ${activeTier.label}`, at: nowISO() }],
      };
      if (isFirstPurchase) {
        next.balance += FIRST_PURCHASE_BONUS;
        next.firstPurchaseBonusGiven = true;
        next.balanceLog = [...next.balanceLog, {
          id: newId(), type: "bonus", amount: FIRST_PURCHASE_BONUS,
          label: "First purchase bonus", at: nowISO(),
        }];
      }
      return next;
    });
    showToast(`${activeProduct.name} \u00b7 ${activeTier.label} added to your holdings`);
    pushNotification(`You bought ${activeProduct.name} \u00b7 ${activeTier.label} for ${fmt(activeTier.price)}.`);
    if (isFirstPurchase) {
      pushNotification(`You earned a ${fmt(FIRST_PURCHASE_BONUS)} first-purchase bonus, credited to your wallet.`);
    }
    setScreen(null);
    setActiveProduct(null);
    setActiveTier(null);
  }

  // Sells a holding at today's real market value \u2014 can be more or less
  // than what was paid. autoExpired marks whether this was a manual sell
  // or the 30-day window forcing the sale.
  function sellHolding(holdingId, autoExpired = false) {
    setStore(s => {
      const holding = s.holdings.find(h => h.id === holdingId);
      if (!holding) return s;
      const { currentValue, gainLoss } = holdingCurrentValue(holding, s.catalog);
      const label = autoExpired
        ? `${holding.productName} \u00b7 ${holding.tierLabel} \u00b7 auto-sold (30-day window)`
        : `${holding.productName} \u00b7 ${holding.tierLabel} \u00b7 sold`;
      if (!autoExpired) {
        showToast(`Sold for ${fmt(currentValue)} \u00b7 new balance ${fmt(s.balance + currentValue)}`);
      }
      const verb = autoExpired ? "auto-sold (30-day window reached)" : "sold";
      const sign = gainLoss >= 0 ? "+" : "";
      return {
        ...s,
        balance: s.balance + currentValue,
        holdings: s.holdings.filter(h => h.id !== holdingId),
        balanceLog: [...s.balanceLog, { id: newId(), type: "sale", amount: currentValue, label, at: nowISO() }],
        notifications: [...s.notifications, {
          id: newId(), at: nowISO(), read: false,
          text: `Your ${holding.productName} \u00b7 ${holding.tierLabel} was ${verb} for ${fmt(currentValue)} (${sign}${fmt(gainLoss)}).`,
        }],
      };
    });
  }

  // Sweep for any holding that has hit its 30-day window and auto-sell
  // it at today's market price. Runs on load and every minute the app
  // stays open \u2014 a real backend would run this as a daily server job
  // instead of relying on the app being open.
  React.useEffect(() => {
    function sweep() {
      setStore(s => {
        const expired = s.holdings.filter(h => holdingIsExpired(h));
        if (expired.length === 0) return s;
        let next = { ...s };
        for (const h of expired) {
          const { currentValue } = holdingCurrentValue(h, next.catalog);
          next = {
            ...next,
            balance: next.balance + currentValue,
            holdings: next.holdings.filter(x => x.id !== h.id),
            balanceLog: [...next.balanceLog, {
              id: newId(), type: "sale", amount: currentValue,
              label: `${h.productName} \u00b7 ${h.tierLabel} \u00b7 auto-sold (30-day window)`, at: nowISO(),
            }],
          };
        }
        return next;
      });
    }
    sweep();
    const interval = setInterval(sweep, 60000);
    return () => clearInterval(interval);
  }, []);

  // Records that a Paystack popup completed from this browser. Does NOT
  // touch balance \u2014 a client can always claim success without paying.
  // The recharge sits as "Pending" until applyVerifiedRecharge() runs,
  // which should only ever be called from a real server-verified source.
  function recordPendingRecharge(amount, reference) {
    if (!amount || amount <= 0) return;
    const record = { id: newId(), amount, at: nowISO(), method: "Paystack", status: "Pending", reference };
    setStore(s => ({ ...s, recharges: [...s.recharges, record] }));
    showToast("Payment received \u2014 confirming with Paystack\u2026");
  }

  // The ONLY function that should ever credit a recharge to the wallet.
  // In this prototype it's exposed on window so you/your developer can
  // call it manually (or wire your backend's webhook response to call
  // it) once Paystack confirms the payment server-side. It intentionally
  // is NOT wired to any client-side "success" callback.
  function applyVerifiedRecharge(reference) {
    setStore(s => {
      const r = s.recharges.find(x => x.reference === reference && x.status === "Pending");
      if (!r) return s;
      return {
        ...s,
        balance: s.balance + r.amount,
        recharges: s.recharges.map(x => x.id === r.id ? { ...x, status: "Verified" } : x),
        balanceLog: [...s.balanceLog, { id: newId(), type: "recharge", amount: r.amount, label: "Wallet recharge \u00b7 Paystack verified", at: nowISO() }],
        notifications: [...s.notifications, {
          id: newId(), at: nowISO(), read: false,
          text: `Your recharge of ${fmt(r.amount)} was verified and added to your balance.`,
        }],
      };
    });
  }
  React.useEffect(() => {
    window.applyVerifiedRecharge = applyVerifiedRecharge;
    return () => { delete window.applyVerifiedRecharge; };
  }, [store]);

  function doWithdraw(amount) {
    if (!amount || amount <= 0 || amount > store.balance) return;
    if (!isWithdrawalDay()) {
      showToast("Withdrawals only open on the 30th");
      return;
    }
    const record = { id: newId(), amount, at: nowISO(), method: "Bank transfer", status: "Pending" };
    setStore(s => ({
      ...s,
      balance: s.balance - amount,
      withdrawals: [...s.withdrawals, record],
      balanceLog: [...s.balanceLog, { id: newId(), type: "withdrawal", amount: -amount, label: "Withdrawal request", at: nowISO() }],
      notifications: [...s.notifications, {
        id: newId(), at: nowISO(), read: false,
        text: `Withdrawal request for ${fmt(amount)} submitted. We'll notify you once it's processed.`,
      }],
    }));
    showToast(`Withdrawal request for ${fmt(amount)} submitted`);
    setScreen(null);
  }

  function handleNav(to) {
    if (to === "recharge") { setScreen("recharge"); return; }
    if (to === "withdraw") { setScreen("withdraw"); return; }
    if (to === "logout") { setConfirmingLogout(true); return; }
    setScreen(to);
  }

  if (!store.authed) {
    return (
      <Shell>
        <Auth mode={authMode} setMode={setAuthMode} onLogin={(phone, email, referralInput) => setStore(s => ({
          ...s,
          authed: true,
          profile: { ...s.profile, phone, email: email || s.profile.email },
          referralCode: s.referralCode || generateReferralCode(),
          referredBy: referralInput || s.referredBy,
        }))} />
      </Shell>
    );
  }

  let body;
  if (confirmingLogout) {
    body = (
      <div style={{ padding: 24 }}>
        <TopBar title="Log out" onBack={() => setConfirmingLogout(false)} />
        <div style={{ padding: "30px 4px", textAlign: "center" }}>
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}>
            <IconBadge name="power" size={52} iconSize={24} bg="#FBEAE7" fg="#B8392A" />
          </div>
          <div style={{ fontFamily: "Georgia, serif", fontSize: 17, color: C.ink, marginBottom: 22 }}>
            Log out of Reaplyst?
          </div>
          <button onClick={() => { setStore(s => ({ ...s, authed: false })); setConfirmingLogout(false); setScreen(null); setTab("home"); }} style={{
            width: "100%", padding: "14px 0", borderRadius: 12, border: "none",
            background: "#B8392A", color: C.cream, fontSize: 15, fontWeight: 700, cursor: "pointer", marginBottom: 10,
          }}>Log out</button>
          <button onClick={() => setConfirmingLogout(false)} style={{
            width: "100%", padding: "14px 0", borderRadius: 12, border: `1px solid ${C.line}`,
            background: "none", color: C.ink, fontSize: 15, fontWeight: 600, cursor: "pointer",
          }}>Cancel</button>
        </div>
      </div>
    );
  } else if (screen === "product") {
    body = <ProductDetail product={activeProduct} onBack={() => setScreen(null)} onSelectTier={selectTier}
      ownedCount={ownedCountFor(activeProduct.id)} />;
  } else if (screen === "tier") {
    body = <TierConfirm product={activeProduct} tier={activeTier} balance={store.balance}
      onBack={() => setScreen("product")} onConfirm={confirmPurchase} />;
  } else if (screen === "recharge") {
    body = <Recharge balance={store.balance} email={userEmailForPaystack(store)}
      onBack={() => setScreen(activeTier ? "tier" : null)} onPendingRecharge={recordPendingRecharge} />;
  } else if (screen === "withdraw") {
    body = <Withdraw balance={store.balance} onBack={() => setScreen(null)} onWithdraw={doWithdraw} />;
  } else if (screen === "balanceRecord") {
    body = <RecordList title="Balance Record" icon="card" onBack={() => setScreen(null)}
      rows={store.balanceLog} emptyText="No balance activity yet."
      renderRow={r => (
        <div key={r.id} style={recordRowStyle()}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, color: C.ink }}>{r.label}</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: r.amount < 0 ? "#B8392A" : C.forest }}>
              {r.amount < 0 ? "-" : "+"}{fmt(Math.abs(r.amount))}
            </span>
          </div>
          <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 4 }}>{fmtWhen(r.at)}</div>
        </div>
      )} />;
  } else if (screen === "purchaseHistory") {
    body = <RecordList title="Purchase History" icon="history" onBack={() => setScreen(null)}
      rows={store.purchases} emptyText="No purchases yet."
      renderRow={r => (
        <div key={r.id} style={recordRowStyle()}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, color: C.ink }}>{r.productName} &middot; {r.tierLabel}</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: C.forest }}>{fmt(r.price)}</span>
          </div>
          <div style={{ fontSize: 11.5, color: C.inkSoft, marginTop: 4 }}>{fmtWhen(r.boughtAt)}</div>
        </div>
      )} />;
  } else if (screen === "rechargeRecord") {
    body = <RecordList title="Recharge Record" icon="doc" onBack={() => setScreen(null)}
      rows={store.recharges} emptyText="No recharges yet."
      renderRow={r => (
        <div key={r.id} style={recordRowStyle()}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, color: C.ink }}>{r.method}</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: r.status === "Pending" ? C.inkSoft : C.forest }}>+{fmt(r.amount)}</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
            <span style={{ fontSize: 11.5, color: C.inkSoft }}>{fmtWhen(r.at)}</span>
            {r.status && (
              <span style={{
                fontSize: 11, fontWeight: 600,
                color: r.status === "Pending" ? C.clay : C.forest,
              }}>{r.status}</span>
            )}
          </div>
        </div>
      )} />;
  } else if (screen === "withdrawalRecord") {
    body = <RecordList title="Withdrawal Record" icon="doc" onBack={() => setScreen(null)}
      rows={store.withdrawals} emptyText="No withdrawal requests yet."
      renderRow={r => (
        <div key={r.id} style={recordRowStyle()}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <span style={{ fontSize: 14, color: C.ink }}>{r.method}</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#B8392A" }}>-{fmt(r.amount)}</span>
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
            <span style={{ fontSize: 11.5, color: C.inkSoft }}>{fmtWhen(r.at)}</span>
            <span style={{ fontSize: 11, color: C.clay, fontWeight: 600 }}>{r.status}</span>
          </div>
        </div>
      )} />;
  } else if (screen === "team") {
    body = <TeamPage store={store} onBack={() => setScreen(null)} />;
  } else if (screen === "news") {
    body = <NewsPage catalog={store.catalog} onBack={() => setScreen(null)} />;
  } else if (screen === "personal") {
    body = <PersonalPage profile={store.profile} onBack={() => setScreen(null)}
      onSave={(profile) => { setStore(s => ({ ...s, profile })); showToast("Personal details saved"); }} />;
  } else if (screen === "message") {
    body = <MessagesPage notifications={store.notifications} onBack={() => setScreen(null)}
      onMarkAllRead={() => setStore(s => ({ ...s, notifications: s.notifications.map(n => ({ ...n, read: true })) }))} />;
  } else if (screen === "about") {
    body = <AboutPage onBack={() => setScreen(null)} />;
  } else if (screen === "bonus") {
    body = <BonusPage store={store} onBack={() => setScreen(null)} />;
  } else if (screen === "proof") {
    body = <ProofPage onBack={() => setScreen(null)} />;
  } else if (screen === "app") {
    body = <AppPage onBack={() => setScreen(null)} />;
  } else if (screen && SIMPLE_PAGES[screen]) {
    const pg = SIMPLE_PAGES[screen];
    body = <Simple title={pg.title} icon={pg.icon} onBack={() => setScreen(null)}>{pg.body}</Simple>;
  } else {
    if (tab === "home") body = <Home onNav={handleNav} onOpenProduct={openProduct} holdings={store.holdings} catalog={store.catalog} />;
    else if (tab === "catalog") body = <Catalog onOpenProduct={openProduct} holdings={store.holdings} catalog={store.catalog} />;
    else if (tab === "earnings") {
      body = <RecordList title="Earning" icon="history" rows={store.holdings} emptyText="No active holdings. Buy a product to see it here."
        renderRow={r => {
          const { currentValue, gainLoss, gainLossPct } = holdingCurrentValue(r, store.catalog);
          const up = gainLoss >= 0;
          const daysLeft = holdingDaysLeft(r);
          const product = store.catalog.find(p => p.id === r.productId);
          return (
            <div key={r.id} style={recordRowStyle()}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 14, color: C.ink }}>{r.productName} &middot; {r.tierLabel}</span>
                <span style={{ fontSize: 14, fontWeight: 700, color: C.forest }}>{fmt(currentValue)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                <span style={{ fontSize: 11.5, color: C.inkSoft }}>
                  Paid {fmt(r.price)} on {fmtWhen(r.boughtAt)}
                </span>
                <span style={{ fontSize: 12, fontWeight: 700, color: up ? C.forest : "#B8392A" }}>
                  {up ? "+" : ""}{fmt(gainLoss)} ({up ? "+" : ""}{gainLossPct.toFixed(1)}%)
                </span>
              </div>
              {product && (
                <div style={{ marginTop: 4 }}>
                  <MarketChangeTag product={product} />
                  <span style={{ fontSize: 10.5, color: C.inkSoft, marginLeft: 6 }}>
                    &middot; market price updates once per day
                  </span>
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
                <span style={{ fontSize: 11, color: daysLeft <= 5 ? "#B8392A" : C.clay, fontWeight: 600 }}>
                  {daysLeft > 0 ? `${daysLeft} day${daysLeft === 1 ? "" : "s"} left to sell` : "Selling today (window closed)"}
                </span>
                <button onClick={() => sellHolding(r.id)} style={{
                  padding: "6px 14px", borderRadius: 8, border: "none", background: C.forest,
                  color: C.cream, fontSize: 12, fontWeight: 700, cursor: "pointer",
                }}>Sell now</button>
              </div>
            </div>
          );
        }} />;
    }
    else if (tab === "share") body = <SharePage store={store} />;
    else if (tab === "my") body = <MyPage balance={store.balance} userId={accountDisplayId(store.profile.phone)} phone={store.profile.phone || "Not set"} onNav={handleNav}
      unreadCount={store.notifications.filter(n => !n.read).length} />;
  }

  return (
    <Shell>
      <div style={{ flex: 1, overflowY: "auto", position: "relative" }}>
        {body}
        {toast && (
          <div style={{
            position: "absolute", left: 16, right: 16, bottom: 16, background: C.forestDeep,
            color: C.cream, padding: "12px 16px", borderRadius: 10, fontSize: 13, textAlign: "center",
            boxShadow: "0 8px 24px rgba(0,0,0,0.25)",
          }}>{toast}</div>
        )}
      </div>
      {!screen && !confirmingLogout && <BottomNav active={tab} onChange={setTab} />}
    </Shell>
  );
}

function Shell({ children }) {
  return (
    <div style={{
      maxWidth: 420, margin: "0 auto", minHeight: "100vh", background: C.cream,
      fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
      display: "flex", flexDirection: "column", color: C.ink,
    }}>
      <StatusGlyph />
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Reaplyst />);
</script>
</body>
</html>
